name: Build WABS Binaries

on:
  push:
    tags:
      - 'v*' # Automatically run when a tag starting with 'v' is pushed (e.g., v1.0.0-beta)
  release:
    types: [published] # Triggers when you publish a new Release in GitHub!
  workflow_dispatch:
    inputs:
      target_os:
        description: 'Target OS to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows-latest
          - ubuntu-latest
          - ubuntu-24.04-arm

permissions:
  contents: write # Required to allow GitHub to attach files to the Release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'workflow_dispatch' || inputs.target_os == 'all' || inputs.target_os == matrix.os
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: WABS-Windows.exe
            path_sep: ";"
          - os: ubuntu-latest
            artifact_name: WABS-Linux
            path_sep: ":"
          - os: ubuntu-24.04-arm
            artifact_name: WABS-RaspberryPi
            path_sep: ":"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Build React Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package with PyInstaller
        shell: bash # Prevents Windows PowerShell from breaking the semicolon
        run: |
          pyinstaller --name ${{ matrix.artifact_name }} --onefile --add-data "frontend/dist${{ matrix.path_sep }}frontend/dist" --add-data "backend/*.onnx${{ matrix.path_sep }}backend" --add-data "backend/*.txt${{ matrix.path_sep }}backend" run.py

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # Only runs if triggered by a tag
        with:
          files: dist/${{ matrix.artifact_name }}*

      - name: Upload Artifact for Manual Runs
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}*